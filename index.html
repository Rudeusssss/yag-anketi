<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AHP Analiz Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --primary: #2563eb; --border: #e2e8f0; --text: #1e293b; }
        
        .comparison-card {
            background: #fff; padding: 15px 5px; border-radius: 12px;
            margin-bottom: 20px; border: 1px solid var(--border);
        }

        .comp-title {
            display: block; font-size: 0.7rem; font-weight: 800;
            color: var(--primary); margin-bottom: 15px; text-align: center;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* Ana Taşıyıcı: Esnek ama taşmayan yapı */
        .ahp-table {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; gap: 2px;
        }

        /* Yanlardaki Kriter İsimleri */
        .side-label {
            width: 22%; font-size: 0.65rem; font-weight: 700;
            color: var(--text); line-height: 1.1; word-wrap: break-word;
        }
        .left-l { text-align: right; padding-right: 4px; }
        .right-l { text-align: left; padding-left: 4px; }

        /* Orta Alan: Sayı ve Butonların Kilitlendiği Yer */
        .middle-box {
            width: 56%; display: flex; flex-direction: column; align-items: center;
        }

        /* Sayı Satırı */
        .num-row {
            display: flex; justify-content: space-between; width: 100%;
            margin-bottom: 6px; padding: 0 2px;
        }
        .num-row span {
            width: 11%; font-size: 0.6rem; font-weight: 800;
            color: #94a3b8; text-align: center;
        }
        .num-row .c-one { color: var(--primary); }

        /* Radyo Buton Satırı */
        .radio-row {
            display: flex; justify-content: space-between; width: 100%;
            padding: 0 2px;
        }
        .radio-row input {
            width: 11%; height: 15px; cursor: pointer; margin: 0;
            -webkit-appearance: radio; /* Mobil tarayıcı uyumu için */
        }

        .sub-header {
            font-size: 0.9rem; font-weight: 800; color: var(--text);
            margin: 25px 0 10px; padding-bottom: 4px;
            border-bottom: 2px solid var(--primary); display: inline-block;
        }

        /* Masaüstü için hafif genişletme */
        @media (min-width: 768px) {
            .side-label { font-size: 0.8rem; }
            .num-row span { font-size: 0.7rem; }
            .radio-row input { height: 18px; }
        }
    </style>
</head>
<body>

    <div class="loader-wrapper" id="loader"><div class="loader"></div></div>

    <div class="container">
        <header class="main-header">
            <h1>Tesis Analiz Portalı</h1>
            <p>AHP Karar Destek Sistemi</p>
            <div class="divider"></div>
        </header>

        <form id="ahpForm" action="https://formspree.io/f/mjgllzgg" method="POST">
            
            <section class="form-section">
                <h2 class="section-title">Uzman Bilgileri</h2>
                <div class="row">
                    <div class="input-group"><label>Ad</label><input type="text" name="Ad" required></div>
                    <div class="input-group"><label>Soyad</label><input type="text" name="Soyad" required></div>
                </div>
                <div class="row">
                    <div class="input-group"><label>Ünvan</label><input type="text" name="Unvan" required></div>
                    <div class="input-group"><label>Tecrübe</label><input type="number" name="Yil" required></div>
                </div>
            </section>

            <section class="form-section">
                <h2 class="section-title">Değerlendirme</h2>
                <div id="ana-group"></div>
                <div class="sub-header">Maliyet</div> <div id="mal-group"></div>
                <div class="sub-header">Verimlilik</div> <div id="ver-group"></div>
                <div class="sub-header">Esneklik</div> <div id="esn-group"></div>
                <div class="sub-header">Risk</div> <div id="rsk-group"></div>
                <div class="sub-header">Alan</div> <div id="aln-group"></div>
                <div class="sub-header">Yönetim</div> <div id="ynt-group"></div>
            </section>

            <button type="submit" class="submit-btn" id="submitBtn">Analizi Tamamla</button>
        </form>
    </div>

    <script>
        const pairs = {
            ana: [["Maliyet", "Verim"], ["Maliyet", "Esneklik"], ["Maliyet", "Risk"], ["Maliyet", "Alan"], ["Maliyet", "Yönetim"], ["Verim", "Esneklik"], ["Verim", "Risk"], ["Verim", "Alan"], ["Verim", "Yönetim"], ["Esneklik", "Risk"], ["Esneklik", "Alan"], ["Esneklik", "Yönetim"], ["Risk", "Alan"], ["Risk", "Yönetim"], ["Alan", "Yönetim"]],
            mal: [["Taşıma", "Kurulum"], ["Taşıma", "İşletme"], ["Kurulum", "İşletme"]],
            ver: [["Hız", "Bekleme"], ["Hız", "Kapasite"], ["Bekleme", "Kapasite"]],
            esn: [["Çeşit", "Talep"], ["Çeşit", "Hat"], ["Talep", "Hat"]],
            rsk: [["Kaza", "Arıza"], ["Kaza", "Gıda"], ["Arıza", "Gıda"]],
            aln: [["Verim", "Depo"], ["Verim", "Genişleme"], ["Depo", "Genişleme"]],
            ynt: [["Kontrol", "Koord"], ["Kontrol", "Bakım"], ["Koord", "Bakım"]]
        };

        function render(list, targetId, prefix) {
            const container = document.getElementById(targetId);
            list.forEach(p => {
                const card = document.createElement('div');
                card.className = 'comparison-card';
                card.innerHTML = `
                    <span class="comp-title">${p[0]} vs ${p[1]}</span>
                    <div class="ahp-table">
                        <div class="side-label left-l">${p[0]}</div>
                        <div class="middle-box">
                            <div class="num-row"><span>9</span><span>7</span><span>5</span><span>3</span><span class="c-one">1</span><span>3</span><span>5</span><span>7</span><span>9</span></div>
                            <div class="radio-row">
                                <input type="radio" name="${prefix}_${p[0]}_${p[1]}" value="-9" required>
                                <input type="radio" name="${prefix}_${p[0]}_${p[1]}" value="-7"><input type="radio" name="${prefix}_${p[0]}_${p[1]}" value="-5">
                                <input type="radio" name="${prefix}_${p[0]}_${p[1]}" value="-3"><input type="radio" name="${prefix}_${p[0]}_${p[1]}" value="1" checked>
                                <input type="radio" name="${prefix}_${p[0]}_${p[1]}" value="3"><input type="radio" name="${prefix}_${p[0]}_${p[1]}" value="5">
                                <input type="radio" name="${prefix}_${p[0]}_${p[1]}" value="7"><input type="radio" name="${prefix}_${p[0]}_${p[1]}" value="9">
                            </div>
                        </div>
                        <div class="side-label right-l">${p[1]}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        Object.keys(pairs).forEach(key => render(pairs[key], key + '-group', key.toUpperCase()));

        document.getElementById('ahpForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = 'Gönderiliyor...';
            const res = await fetch(this.action, { method: 'POST', body: new FormData(this), headers: { 'Accept': 'application/json' } });
            if (res.ok) { this.style.display = 'none'; alert('Başarıyla Gönderildi!'); window.scrollTo(0,0); }
        };
        window.onload = () => { document.getElementById('loader').style.display = 'none'; };
    </script>
</body>
</html>
